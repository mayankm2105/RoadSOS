services:
  - type: web
    name: roadsos-backend
    runtime: python
    buildCommand: pip install --upgrade setuptools && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/v1/health
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: WHISPER_MODEL
        value: base
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: SOS_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
